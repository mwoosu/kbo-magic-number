# ============================================================
# KBO 대시보드 자동 업데이트 워크플로우
# ============================================================
#
# 이 파일이 하는 일:
#   1. 매일 KST 23:00 (UTC 14:00)에 자동 실행
#   2. Chrome + Python + Gurobi 설치
#   3. 라이브 데이터 크롤링 → phase(시범경기/정규시즌) 판별
#   4. 정규시즌이면 solver 실행, 시범경기면 standings JSON 생성
#   5. 결과를 git commit & push → GitHub Pages에 자동 반영
#
# 수동 실행도 가능: Actions 탭 → "Run workflow" 버튼
#
# 필요한 GitHub Secrets (repo Settings → Secrets → Actions):
#   - GRB_WLSACCESSID : Gurobi WLS Access ID
#   - GRB_WLSSECRET   : Gurobi WLS Secret
#   - GRB_LICENSEID   : Gurobi License ID
# ============================================================

name: Daily KBO Dashboard

on:
  schedule:
    # UTC 14:00 = KST 23:00 (경기 종료 후)
    - cron: '0 14 * * *'
  workflow_dispatch:  # 수동 실행 허용

permissions:
  contents: write  # git push 권한 필요

jobs:
  calculate:
    runs-on: ubuntu-latest
    env:
      DASHBOARD_PHASE: regular

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v2
        with:
          install-chromedriver: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Detect Chrome binary
        run: |
          CHROME_BIN="${{ steps.setup-chrome.outputs.chrome-path }}"
          if [ -z "$CHROME_BIN" ]; then
            CHROME_BIN="$(command -v chrome || command -v google-chrome || true)"
          fi
          echo "CHROME_BIN=$CHROME_BIN" >> "$GITHUB_ENV"
          "$CHROME_BIN" --version

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Build dashboard JSON
        env:
          GRB_WLSACCESSID: ${{ secrets.GRB_WLSACCESSID }}
          GRB_WLSSECRET: ${{ secrets.GRB_WLSSECRET }}
          GRB_LICENSEID: ${{ secrets.GRB_LICENSEID }}
          TZ: Asia/Seoul
        run: |
          python live_dashboard.py \
            --phase "$DASHBOARD_PHASE" \
            --output docs/data/result.json \
            --source-output data/live_source.json

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/result.json data/live_source.json
          # 변경사항이 있을 때만 커밋 (없으면 조기 종료)
          git diff --staged --quiet || git commit -m "Update KBO dashboard $(date +%Y-%m-%d)"
          git push

      # ============================================================
      # 가비아 서버 동기화 (result.json만 매일 업로드)
      # 필요한 GitHub Secrets:
      #   - GABIA_SFTP_HOST : 가비아 SFTP 호스트 (예: cois.dankook.ac.kr)
      #   - GABIA_SFTP_USER : 가비아 SFTP 사용자명
      #   - GABIA_SFTP_PASS : 가비아 SFTP 비밀번호
      # ============================================================
      - name: Upload result.json to Gabia via SFTP
        if: env.GABIA_SFTP_HOST != ''
        env:
          GABIA_SFTP_HOST: ${{ secrets.GABIA_SFTP_HOST }}
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.GABIA_SFTP_HOST }}
          username: ${{ secrets.GABIA_SFTP_USER }}
          password: ${{ secrets.GABIA_SFTP_PASS }}
          port: 22
          local_path: docs/data/result.json
          remote_path: /kbo/data/result.json
          sftp_only: true
