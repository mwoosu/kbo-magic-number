# ============================================================
# KBO 매직넘버 자동 계산 워크플로우
# ============================================================
#
# 이 파일이 하는 일:
#   1. 매일 KST 23:00 (UTC 14:00)에 자동 실행
#   2. Python + Gurobi 설치
#   3. main.py 실행 → result.json 생성
#   4. 결과를 git commit & push → GitHub Pages에 자동 반영
#
# 수동 실행도 가능: Actions 탭 → "Run workflow" 버튼
#
# 필요한 GitHub Secrets (repo Settings → Secrets → Actions):
#   - GRB_WLSACCESSID : Gurobi WLS Access ID
#   - GRB_WLSSECRET   : Gurobi WLS Secret
#   - GRB_LICENSEID   : Gurobi License ID
# ============================================================

name: Daily Magic Number

on:
  schedule:
    # UTC 14:00 = KST 23:00 (경기 종료 후)
    - cron: '0 14 * * *'
  workflow_dispatch:  # 수동 실행 허용

permissions:
  contents: write  # git push 권한 필요

jobs:
  calculate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install gurobipy

      - name: Run magic number calculation
        env:
          GRB_WLSACCESSID: ${{ secrets.GRB_WLSACCESSID }}
          GRB_WLSSECRET: ${{ secrets.GRB_WLSSECRET }}
          GRB_LICENSEID: ${{ secrets.GRB_LICENSEID }}
        run: |
          python main.py --output docs/data/result.json

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/result.json
          # 변경사항이 있을 때만 커밋 (없으면 조기 종료)
          git diff --staged --quiet || git commit -m "Update magic numbers $(date +%Y-%m-%d)"
          git push
