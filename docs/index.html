<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBO 매직넘버 대시보드</title>
    <meta name="description" content="KBO 프로야구 포스트시즌 진출 매직넘버를 매일 자동으로 계산합니다.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">

<body>

            <p class="subtitle" id="update-info">데이터 로딩 중...</p>

        <footer>
            <p>Kim et al. (2024) MILP 모델 기반 · 매일 경기 종료 후 자동 업데이트</p>
